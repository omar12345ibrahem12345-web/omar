<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prestige Realty HR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <svg width="60" height="60" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="8" fill="#C9A84C"/>
                    <path d="M10 26V12l8-4 8 4v14" stroke="#1E3A5F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 26V18h8v8" stroke="#1E3A5F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="auth-title">Prestige Realty</h1>
            <p class="auth-subtitle">HR Management System</p>

            <div id="loginError" class="auth-error" style="display:none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-lg auth-btn" id="loginBtn">
                    Sign In
                </button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Create one</a>
            </p>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
    fetch('/api/auth/session', { credentials: 'same-origin' })
        .then(function(r) { return r.json(); })
        .then(function(data) { if (data.session) window.location.href = 'index.html'; });

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = document.getElementById('loginEmail').value;
        var password = document.getElementById('loginPassword').value;
        var btn = document.getElementById('loginBtn');
        var errorDiv = document.getElementById('loginError');

        btn.textContent = 'Signing in...';
        btn.disabled = true;
        errorDiv.style.display = 'none';

        var result = await handleLogin(email, password);

        if (result.error) {
            errorDiv.textContent = result.error.message;
            errorDiv.style.display = 'block';
            btn.textContent = 'Sign In';
            btn.disabled = false;
        } else {
            window.location.href = 'index.html';
        }
    });
    </script>
</body>
</html>
