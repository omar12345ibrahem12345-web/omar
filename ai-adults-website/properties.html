<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Prestige Realty Group - Property Listings">
    <title>Property Listings - Prestige Realty HR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="8" fill="#C9A84C"/>
                    <path d="M10 26V12l8-4 8 4v14" stroke="#1E3A5F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M14 26V18h8v8" stroke="#1E3A5F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="sidebar-brand-text">
                    <h2>Prestige Realty</h2>
                    <span>HR Management</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Main</div>
                <a href="index.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Dashboard
                </a>
                <a href="employees.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Employees
                </a>
                <a href="employees-id.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    Employee ID &amp; Photos
                </a>
                <a href="recruiting.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    Recruiting
                    <span class="sidebar-badge">5</span>
                </a>
                <a href="payroll.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Payroll & Benefits
                </a>

                <div class="sidebar-section-title">Properties</div>
                <a href="properties.html" class="sidebar-link active">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><rect x="9" y="14" width="6" height="8"/></svg>
                    Property Listings
                </a>
                <div class="sidebar-section-title">Finance</div>
                <a href="budget.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>
                    Budget
                </a>
                <div class="sidebar-section-title">Analytics</div>
                <a href="reports.html" class="sidebar-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Reports & Analytics
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <div class="top-header-left">
                    <button class="mobile-menu-btn" aria-label="Toggle menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1 class="page-title">Property Listings</h1>
                </div>
                <div class="top-header-right">
                    <div class="header-search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Search employees, properties...">
                    </div>
                    <div class="header-actions">
                        <div class="notification-wrapper">
                            <button class="header-btn" aria-label="Notifications" id="notificationBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                                <span class="notification-dot" id="notificationDot" style="display:none;"></span>
                            </button>
                            <div class="notification-dropdown" id="notificationDropdown"></div>
                        </div>
                        <div class="user-avatar">SM</div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="toolbar-left">
                        <button class="filter-btn active">All <span>(28)</span></button>
                        <button class="filter-btn">For Sale <span>(18)</span></button>
                        <button class="filter-btn">For Rent <span>(6)</span></button>
                        <button class="filter-btn">Sold <span>(4)</span></button>
                    </div>
                    <div class="toolbar-right">
                        <button class="btn btn-accent" data-modal="addPropertyModal">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Add Listing
                        </button>
                    </div>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon gold">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><rect x="9" y="14" width="6" height="8"/></svg>
                        </div>
                        <div class="stat-info">
                            <h4 class="property-stat-total">0</h4>
                            <p>Total Listings</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon blue">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </div>
                        <div class="stat-info">
                            <h4 class="property-stat-sale">0</h4>
                            <p>For Sale</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                        </div>
                        <div class="stat-info">
                            <h4 class="property-stat-rent">0</h4>
                            <p>For Rent</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                        </div>
                        <div class="stat-info">
                            <h4 class="property-stat-sold">0</h4>
                            <p>Sold</p>
                        </div>
                    </div>
                </div>

                <!-- Property Grid (Dynamic) -->
                <div class="grid-3" id="propertyGrid">
                    <!-- Properties loaded dynamically -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Property Modal -->
    <div class="modal-overlay" id="addPropertyModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Property</h3>
                <button class="modal-close" aria-label="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="addPropertyForm" onsubmit="handleAddProperty(event)">
                    <div class="form-group">
                        <label for="propertyName">Property Name</label>
                        <input type="text" id="propertyName" name="name" class="form-input" placeholder="Enter property name" required>
                    </div>
                    <div class="form-group">
                        <label for="propertyAddress">Address</label>
                        <input type="text" id="propertyAddress" name="address" class="form-input" placeholder="Enter full address" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="propertyType">Property Type</label>
                            <select id="propertyType" name="type" class="form-input" required>
                                <option value="">Select type</option>
                                <option value="house">House</option>
                                <option value="condo">Condo</option>
                                <option value="townhouse">Townhouse</option>
                                <option value="land">Land</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="propertyStatus">Status</label>
                            <select id="propertyStatus" name="status" class="form-input" required>
                                <option value="">Select status</option>
                                <option value="for-sale">For Sale</option>
                                <option value="for-rent">For Rent</option>
                                <option value="sold">Sold</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="propertyPrice">Price ($)</label>
                            <input type="number" id="propertyPrice" name="price" class="form-input" placeholder="0" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="propertyBedrooms">Bedrooms</label>
                            <input type="number" id="propertyBedrooms" name="bedrooms" class="form-input" placeholder="0" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="propertyBathrooms">Bathrooms</label>
                            <input type="number" id="propertyBathrooms" name="bathrooms" class="form-input" placeholder="0" min="0" required>
                        </div>
                        <div class="form-group">
                            <label for="propertyAgent">Assigned Agent</label>
                            <select id="propertyAgent" name="agent" class="form-input" required>
                                <option value="">Select agent</option>
                                <option value="james-rodriguez">James Rodriguez</option>
                                <option value="emily-chen">Emily Chen</option>
                                <option value="michael-torres">Michael Torres</option>
                                <option value="thomas-harris">Thomas Harris</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-cancel">Cancel</button>
                <button class="btn btn-accent" type="submit" form="addPropertyForm">Add Property</button>
            </div>
        </div>
    </div>

    <!-- Edit Property Modal -->
    <div class="modal-overlay" id="editPropertyModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Edit Property</h3>
                <button class="modal-close" aria-label="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="editPropertyForm" onsubmit="handleEditProperty(event)">
                    <input type="hidden" name="editPropertyId">
                    <div class="form-group">
                        <label>Property Name</label>
                        <input type="text" name="editPropertyName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" name="editPropertyAddress" class="form-input" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Property Type</label>
                            <select name="editPropertyType" class="form-input" required>
                                <option value="">Select type</option>
                                <option value="house">House</option>
                                <option value="condo">Condo</option>
                                <option value="townhouse">Townhouse</option>
                                <option value="land">Land</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select name="editPropertyStatus" class="form-input" required>
                                <option value="for-sale">For Sale</option>
                                <option value="for-rent">For Rent</option>
                                <option value="sold">Sold</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Price ($)</label>
                            <input type="number" name="editPropertyPrice" class="form-input" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>Bedrooms</label>
                            <input type="number" name="editPropertyBedrooms" class="form-input" min="0" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Bathrooms</label>
                            <input type="number" name="editPropertyBathrooms" class="form-input" min="0" required>
                        </div>
                        <div class="form-group">
                            <label>Assigned Agent</label>
                            <select name="editPropertyAgent" class="form-input" required>
                                <option value="">Select agent</option>
                                <option value="James Rodriguez">James Rodriguez</option>
                                <option value="Emily Chen">Emily Chen</option>
                                <option value="Michael Torres">Michael Torres</option>
                                <option value="Thomas Harris">Thomas Harris</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary btn-cancel">Cancel</button>
                <button class="btn btn-accent" type="submit" form="editPropertyForm">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
